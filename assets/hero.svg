    <text x="0" y="-2" font-family="ui-monospace, 'SF Mono', 'Cascadia Mono', 'Fira Code', Menlo, Monaco, monospace" font-size="13" fill="#aaaaaa" text-anchor="middle">Built for OpenClaw</text>
