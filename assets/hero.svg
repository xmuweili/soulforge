<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="320" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#0f0f0f"/>
    </linearGradient>
    <linearGradient id="title-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="top-bar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.7"/>
      <stop offset="50%" stop-color="#6366f1" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0.7"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.45" r="0.5">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.04"/>
      <stop offset="50%" stop-color="#6366f1" stop-opacity="0.02"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="320" fill="url(#bg)"/>

  <!-- Top accent -->
  <rect x="0" y="0" width="1200" height="2" fill="url(#top-bar)"/>

  <!-- Subtle center glow -->
  <ellipse cx="600" cy="140" rx="500" ry="200" fill="url(#glow)"/>

  <!-- Title -->
  <text x="600" y="145" font-family="ui-monospace, 'SF Mono', 'Cascadia Mono', 'Fira Code', Menlo, Monaco, monospace" font-size="96" font-weight="700" fill="url(#title-grad)" text-anchor="middle" letter-spacing="-4">soulforge</text>

  <!-- Tagline -->
  <text x="600" y="200" font-family="ui-monospace, 'SF Mono', 'Cascadia Mono', 'Fira Code', Menlo, Monaco, monospace" font-size="20" fill="#666" text-anchor="middle" letter-spacing="6">CLONE ANYONE INTO AN AI AGENT</text>

  <!-- Command -->
  <g transform="translate(600, 270)">
    <rect x="-230" y="-18" width="460" height="36" rx="6" fill="#141414" stroke="#222" stroke-width="1"/>
    <text x="-205" y="5" font-family="ui-monospace, 'SF Mono', 'Cascadia Mono', Menlo, Monaco, monospace" font-size="14">
      <tspan fill="#444">$</tspan>
      <tspan fill="#ccc"> soulforge </tspan>
      <tspan fill="#10b981">elon-musk</tspan>
      <tspan fill="#444"> --data </tspan>
      <tspan fill="#6366f1">./interviews/</tspan>
    </text>
  </g>
</svg>
