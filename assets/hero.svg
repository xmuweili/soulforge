<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#111111"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="accent-h" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="accent-top" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.8"/>
      <stop offset="50%" stop-color="#6366f1" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0.8"/>
    </linearGradient>
    <linearGradient id="line-fade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0"/>
      <stop offset="15%" stop-color="#10b981" stop-opacity="0.25"/>
      <stop offset="85%" stop-color="#6366f1" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="glow-green" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#10b981" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-purple" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="forge-glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.12"/>
      <stop offset="40%" stop-color="#6366f1" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Top accent border -->
  <rect x="0" y="0" width="1200" height="2" fill="url(#accent-top)"/>

  <!-- Subtle grid -->
  <g opacity="0.035" stroke="#fff" stroke-width="0.5">
    <line x1="100" y1="0" x2="100" y2="630"/><line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="300" y1="0" x2="300" y2="630"/><line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="500" y1="0" x2="500" y2="630"/><line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="700" y1="0" x2="700" y2="630"/><line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="900" y1="0" x2="900" y2="630"/><line x1="1000" y1="0" x2="1000" y2="630"/>
    <line x1="1100" y1="0" x2="1100" y2="630"/>
    <line x1="0" y1="100" x2="1200" y2="100"/><line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="300" x2="1200" y2="300"/><line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="500" x2="1200" y2="500"/>
  </g>

  <!-- Background glow orbs (radial gradients, no filter needed) -->
  <ellipse cx="300" cy="340" rx="300" ry="250" fill="url(#glow-green)"/>
  <ellipse cx="900" cy="340" rx="300" ry="250" fill="url(#glow-purple)"/>

  <!-- Center forge glow -->
  <circle cx="600" cy="355" r="180" fill="url(#forge-glow)"/>

  <!-- === TITLE === -->
  <text x="600" y="155" font-family="ui-monospace, 'SF Mono', 'Cascadia Mono', 'Fira Code', Menlo, Monaco, monospace" font-size="80" font-weight="700" fill="url(#accent-h)" text-anchor="middle" letter-spacing="-3">soulforge</text>

  <!-- Tagline -->
  <text x="600" y="205" font-family="ui-monospace, 'SF Mono', 'Cascadia Mono', 'Fira Code', Menlo, Monaco, monospace" font-size="18" fill="#777" text-anchor="middle" letter-spacing="4">CLONE ANYONE INTO AN AI AGENT</text>

  <!-- Thin separator -->
  <line x1="440" y1="235" x2="760" y2="235" stroke="url(#accent-h)" stroke-width="0.5" opacity="0.3"/>

  <!-- === FLOW DIAGRAM === -->

  <!-- Flow baseline -->
  <line x1="100" y1="430" x2="1100" y2="430" stroke="url(#line-fade)" stroke-width="0.5"/>

  <!-- LEFT: Input — stacked transcript lines -->
  <g transform="translate(175, 340)">
    <rect x="-55" y="-20" width="130" height="90" rx="4" fill="#111" stroke="#222" stroke-width="1"/>
    <rect x="-40" y="-6" width="70" height="2.5" rx="1" fill="#10b981" opacity="0.5"/>
    <rect x="-40" y="5" width="50" height="2.5" rx="1" fill="#10b981" opacity="0.35"/>
    <rect x="-40" y="16" width="85" height="2.5" rx="1" fill="#10b981" opacity="0.45"/>
    <rect x="-40" y="27" width="40" height="2.5" rx="1" fill="#10b981" opacity="0.3"/>
    <rect x="-40" y="38" width="65" height="2.5" rx="1" fill="#10b981" opacity="0.4"/>
    <rect x="-40" y="49" width="55" height="2.5" rx="1" fill="#10b981" opacity="0.25"/>
  </g>
  <text x="175" y="460" font-family="ui-monospace, 'SF Mono', 'Cascadia Mono', Menlo, Monaco, monospace" font-size="11" fill="#10b981" opacity="0.5" text-anchor="middle">raw transcripts</text>

  <!-- LEFT ARROW -->
  <line x1="260" y1="375" x2="480" y2="358" stroke="#10b981" stroke-width="0.8" opacity="0.3"/>
  <polygon points="480,358 468,352 470,362" fill="#10b981" opacity="0.3"/>

  <!-- CENTER: Forge hexagon -->
  <g transform="translate(600, 358)">
    <!-- Outer hex -->
    <polygon points="0,-65 56.3,-32.5 56.3,32.5 0,65 -56.3,32.5 -56.3,-32.5"
             fill="none" stroke="url(#accent)" stroke-width="1.5" opacity="0.5"/>
    <!-- Mid hex -->
    <polygon points="0,-42 36.4,-21 36.4,21 0,42 -36.4,21 -36.4,-21"
             fill="none" stroke="url(#accent)" stroke-width="1" opacity="0.25"/>
    <!-- Inner hex -->
    <polygon points="0,-22 19.1,-11 19.1,11 0,22 -19.1,11 -19.1,-11"
             fill="none" stroke="url(#accent)" stroke-width="0.8" opacity="0.15"/>
    <!-- Core dot -->
    <circle cx="0" cy="0" r="5" fill="url(#accent)" opacity="0.7"/>
    <circle cx="0" cy="0" r="2" fill="#fff" opacity="0.9"/>
  </g>

  <!-- Particles around forge -->
  <circle cx="548" cy="328" r="2" fill="#10b981" opacity="0.4"/>
  <circle cx="560" cy="390" r="1.5" fill="#10b981" opacity="0.3"/>
  <circle cx="652" cy="322" r="1.5" fill="#6366f1" opacity="0.45"/>
  <circle cx="645" cy="395" r="2" fill="#6366f1" opacity="0.35"/>
  <circle cx="575" cy="310" r="1" fill="#8b5cf6" opacity="0.35"/>
  <circle cx="630" cy="405" r="1" fill="#8b5cf6" opacity="0.25"/>
  <circle cx="540" cy="360" r="1.5" fill="#10b981" opacity="0.25"/>
  <circle cx="660" cy="355" r="1.5" fill="#6366f1" opacity="0.3"/>

  <!-- RIGHT ARROW -->
  <line x1="720" y1="358" x2="880" y2="340" stroke="#6366f1" stroke-width="0.8" opacity="0.3"/>
  <polygon points="880,340 868,334 870,344" fill="#6366f1" opacity="0.3"/>

  <!-- RIGHT: Output — four agent files -->
  <g transform="translate(960, 320)">
    <rect x="-60" y="-12" width="140" height="105" rx="4" fill="#111" stroke="#222" stroke-width="1"/>
    <!-- SOUL.md -->
    <rect x="-44" y="2" width="10" height="13" rx="1.5" fill="none" stroke="#6366f1" stroke-width="0.8" opacity="0.7"/>
    <text x="-28" y="12" font-family="ui-monospace, 'SF Mono', 'Cascadia Mono', Menlo, Monaco, monospace" font-size="12" fill="#6366f1" opacity="0.7">SOUL.md</text>
    <!-- MEMORY.md -->
    <rect x="-44" y="24" width="10" height="13" rx="1.5" fill="none" stroke="#6366f1" stroke-width="0.8" opacity="0.55"/>
    <text x="-28" y="34" font-family="ui-monospace, 'SF Mono', 'Cascadia Mono', Menlo, Monaco, monospace" font-size="12" fill="#6366f1" opacity="0.55">MEMORY.md</text>
    <!-- AGENTS.md -->
    <rect x="-44" y="46" width="10" height="13" rx="1.5" fill="none" stroke="#6366f1" stroke-width="0.8" opacity="0.4"/>
    <text x="-28" y="56" font-family="ui-monospace, 'SF Mono', 'Cascadia Mono', Menlo, Monaco, monospace" font-size="12" fill="#6366f1" opacity="0.4">AGENTS.md</text>
    <!-- IDENTITY.md -->
    <rect x="-44" y="68" width="10" height="13" rx="1.5" fill="none" stroke="#6366f1" stroke-width="0.8" opacity="0.3"/>
    <text x="-28" y="78" font-family="ui-monospace, 'SF Mono', 'Cascadia Mono', Menlo, Monaco, monospace" font-size="12" fill="#6366f1" opacity="0.3">IDENTITY.md</text>
  </g>
  <text x="960" y="460" font-family="ui-monospace, 'SF Mono', 'Cascadia Mono', Menlo, Monaco, monospace" font-size="11" fill="#6366f1" opacity="0.5" text-anchor="middle">digital clone</text>

  <!-- === COMMAND LINE AT BOTTOM === -->
  <g transform="translate(600, 545)">
    <rect x="-240" y="-20" width="480" height="40" rx="8" fill="#161616" stroke="#2a2a2a" stroke-width="1"/>
    <text x="-215" y="5" font-family="ui-monospace, 'SF Mono', 'Cascadia Mono', Menlo, Monaco, monospace" font-size="14">
      <tspan fill="#555">$</tspan>
      <tspan fill="#e0e0e0"> soulforge </tspan>
      <tspan fill="#10b981">elon-musk</tspan>
      <tspan fill="#555"> --data </tspan>
      <tspan fill="#6366f1">./interviews/</tspan>
    </text>
  </g>

  <!-- Bottom fade -->
  <rect x="0" y="600" width="1200" height="30" fill="#0a0a0a" opacity="0.5"/>
</svg>
